<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 내부링크 도우미</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-size: 14px;
      background: #f8f9fa;
      color: #212529;
    }

    .header {
      background: #03C75A;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header .sub { font-size: 11px; opacity: 0.85; margin-top: 1px; }

    .section {
      background: white;
      margin: 10px;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #868e96;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 6px;
    }

    input[type="text"] {
      flex: 1;
      border: 1px solid #dee2e6;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #03C75A; }

    button {
      background: #03C75A;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover { background: #02a84c; }
    button:disabled { background: #adb5bd; cursor: not-allowed; }

    .blog-status {
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      display: none;
    }
    .blog-status.success { background: #e6f9ee; color: #087f3d; }
    .blog-status.error { background: #fff0f0; color: #c0392b; }
    .blog-status.info { background: #e8f4fd; color: #1a6fa8; }

    .tabs {
      display: flex;
      border-bottom: 1px solid #e9ecef;
      margin-bottom: 12px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #868e96;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: #03C75A; border-bottom-color: #03C75A; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .result-list { margin-top: 10px; }

    .result-item {
      padding: 8px 10px;
      border: 1px solid #e9ecef;
      border-radius: 7px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .result-item:hover { background: #f1fff7; border-color: #03C75A; }
    .result-item .title { font-size: 13px; font-weight: 600; color: #212529; }
    .result-item .meta { font-size: 11px; color: #868e96; margin-top: 2px; }
    .result-item .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 4px;
    }
    .badge-high { background: #fff3cd; color: #856404; }
    .badge-med { background: #e8f4fd; color: #1a6fa8; }

    .empty { text-align: center; color: #adb5bd; font-size: 13px; padding: 20px 0; }

    .limit-bar {
      font-size: 11px;
      color: #868e96;
      text-align: right;
      margin-top: 6px;
    }
    .limit-bar span { font-weight: 700; color: #212529; }

    .loading {
      text-align: center;
      padding: 16px;
      color: #868e96;
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #dee2e6;
      border-top-color: #03C75A;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .copy-toast {
      position: fixed;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      background: #212529;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .copy-toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🔗 네이버 내부링크 도우미</h1>
    <div class="sub">블로그 내부링크 추천 · 중복 글 감지</div>
  </div>
</div>

<!-- 블로그 등록 섹션 -->
<div class="section">
  <div class="section-title">블로그 등록</div>
  <div class="input-row">
    <input type="text" id="blogIdInput" placeholder="네이버 블로그 ID (예: myblog123)" />
    <button id="indexBtn">수집</button>
  </div>
  <div class="blog-status" id="blogStatus"></div>
</div>

<!-- 기능 탭 -->
<div class="section" id="featureSection" style="display:none;">
  <div class="tabs">
    <div class="tab active" data-tab="search">② 관련 글 찾기</div>
    <div class="tab" data-tab="duplicate">③ 중복 감지</div>
  </div>

  <!-- 관련 글 찾기 -->
  <div class="tab-panel active" id="tab-search">
    <div class="input-row">
      <input type="text" id="searchKeyword" placeholder="새 글 키워드 입력" />
      <button id="searchBtn">검색</button>
    </div>
    <div class="limit-bar" id="limitBar" style="display:none;">
      오늘 사용: <span id="usedCount">0</span> / <span id="limitCount">5</span>회
    </div>
    <div class="result-list" id="searchResults"></div>
  </div>

  <!-- 중복 감지 -->
  <div class="tab-panel" id="tab-duplicate">
    <div class="input-row">
      <input type="text" id="dupKeyword" placeholder="쓰려는 글 키워드 입력" />
      <button id="dupBtn">감지</button>
    </div>
    <div class="result-list" id="dupResults"></div>
  </div>
</div>

<div class="copy-toast" id="copyToast">링크 복사됨!</div>

<script src="popup.js"></script>
</body>
</html>
