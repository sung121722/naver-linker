<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 내부링크 도우미</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

<!-- ── 헤더 ──────────────────────────────────────────── -->
<header class="header">
  <span class="header-icon">🔗</span>
  <div>
    <h1 class="header-title">네이버 내부링크 도우미</h1>
    <p class="header-sub">관련 글 추천 · 중복 감지</p>
  </div>
</header>

<!-- ── 블로그 등록 ────────────────────────────────────── -->
<section class="card" id="registSection">
  <p class="section-label">블로그 등록</p>
  <div class="input-row">
    <input type="text" id="blogIdInput" class="inp" placeholder="네이버 블로그 ID (예: myblog123)" />
    <button class="btn btn-green" id="indexBtn">수집</button>
  </div>

  <!-- 프로그레스 바 -->
  <div id="progressWrap" class="progress-wrap hidden">
    <div class="progress-track">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <p id="progressLabel" class="progress-label">수집 준비 중...</p>
  </div>

  <!-- 블로그 프로필 카드 -->
  <div id="blogCard" class="blog-profile hidden">
    <div class="blog-avatar">📝</div>
    <div class="blog-info">
      <div class="blog-id" id="blogCardId">—</div>
      <div class="blog-meta" id="blogCardMeta">글 0개 등록됨</div>
    </div>
    <span class="blog-ok-badge">✓ 등록완료</span>
    <button class="btn-icon" id="reindexBtn" title="글 목록 재수집">↺</button>
  </div>

  <!-- 상태 메시지 -->
  <div id="blogStatus" class="status-msg hidden"></div>
</section>

<!-- ── 기능 영역 (등록 후 표시) ──────────────────────── -->
<div id="featureSection" style="display:none">

  <!-- 플랜 + 사용량 게이지 -->
  <div class="plan-bar" id="planBar">
    <div class="plan-bar-top">
      <span class="plan-badge free" id="planBadge">FREE</span>
      <span class="plan-usage-text" id="planUsageText">오늘 <b id="usedCount">0</b> / <b id="limitCount">5</b>회 사용</span>
      <button class="btn btn-orange" id="upgradeBtn" style="display:none">🔓 업그레이드</button>
    </div>
    <div class="gauge-track">
      <div class="gauge-fill" id="gaugeFill"></div>
    </div>
    <p class="gauge-label" id="gaugeLabel">오늘 5회 남음</p>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" data-tab="search">관련 글 찾기</div>
    <div class="tab" data-tab="duplicate">중복 감지</div>
  </div>

  <!-- ── 관련 글 탭 ── -->
  <div class="tab-panel active" id="tab-search">
    <div class="tab-inner">
      <div class="input-row">
        <input type="text" id="searchKeyword" class="inp" placeholder="새 글 키워드 입력" />
        <button class="btn btn-green" id="searchBtn">검색</button>
      </div>
      <div class="topn-row">
        <span class="topn-label">결과 수</span>
        <div class="topn-btns">
          <button class="topn-btn active" data-n="5">5개</button>
          <button class="topn-btn" data-n="10">10개</button>
          <button class="topn-btn" data-n="20">20개</button>
        </div>
      </div>
    </div>
    <div id="searchResults" class="results-area"></div>
  </div>

  <!-- ── 중복 감지 탭 ── -->
  <div class="tab-panel" id="tab-duplicate">
    <div class="tab-inner">
      <div class="input-row">
        <input type="text" id="dupKeyword" class="inp" placeholder="쓰려는 글 키워드 입력" />
        <button class="btn btn-green" id="dupBtn">감지</button>
      </div>
      <div class="topn-row">
        <span class="topn-label">결과 수</span>
        <div class="topn-btns">
          <button class="dup-topn-btn active" data-n="5">5개</button>
          <button class="dup-topn-btn" data-n="10">10개</button>
          <button class="dup-topn-btn" data-n="20">20개</button>
        </div>
      </div>
    </div>
    <div id="dupResults" class="results-area"></div>
  </div>
</div>

<!-- ── 토스트 ────────────────────────────────────────── -->
<div class="toast" id="copyToast">✅ 복사 완료!</div>

<script src="popup.js"></script>
</body>
</html>
